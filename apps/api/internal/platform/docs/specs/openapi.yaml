openapi: 3.0.3
info:
  title: Zenvikar API
  version: 1.0.0
  description: |
    Multi-tenant API for Zenvikar platform.

    Notes:
    - This documentation reflects the currently implemented endpoints.
    - Swagger UI is enabled only in non-production environments.
servers:
  - url: http://api.zenvikar.localhost
    description: Local domain via Traefik
  - url: http://localhost:8080
    description: Local API server
tags:
  - name: Auth
    description: Authentication and session token endpoints for booking, tenant, and admin apps.
  - name: Health
    description: Operational health and readiness checks used by orchestrators.
  - name: Observability
    description: Runtime metrics for Prometheus scraping.
  - name: Tenants
    description: Tenant resolution for subdomain-driven multi-tenancy.
paths:
  /healthz:
    $ref: "./domains/platform.yaml#/paths/~1healthz"
  /readyz:
    $ref: "./domains/platform.yaml#/paths/~1readyz"
  /metrics:
    $ref: "./domains/platform.yaml#/paths/~1metrics"
  /api/v1/tenants/resolve:
    $ref: "./domains/tenants.yaml#/paths/~1api~1v1~1tenants~1resolve"
  /api/v1/auth/signup:
    $ref: "./domains/auth.yaml#/paths/~1api~1v1~1auth~1signup"
  /api/v1/auth/login:
    $ref: "./domains/auth.yaml#/paths/~1api~1v1~1auth~1login"
  /api/v1/auth/social:
    $ref: "./domains/auth.yaml#/paths/~1api~1v1~1auth~1social"
  /api/v1/auth/oauth/google/start:
    $ref: "./domains/auth.yaml#/paths/~1api~1v1~1auth~1oauth~1google~1start"
  /api/v1/auth/oauth/google/callback:
    $ref: "./domains/auth.yaml#/paths/~1api~1v1~1auth~1oauth~1google~1callback"
  /api/v1/auth/oauth/facebook/start:
    $ref: "./domains/auth.yaml#/paths/~1api~1v1~1auth~1oauth~1facebook~1start"
  /api/v1/auth/oauth/facebook/callback:
    $ref: "./domains/auth.yaml#/paths/~1api~1v1~1auth~1oauth~1facebook~1callback"
  /api/v1/auth/admin/login:
    $ref: "./domains/auth.yaml#/paths/~1api~1v1~1auth~1admin~1login"
  /api/v1/auth/tenant/login:
    $ref: "./domains/auth.yaml#/paths/~1api~1v1~1auth~1tenant~1login"
  /api/v1/auth/me:
    $ref: "./domains/auth.yaml#/paths/~1api~1v1~1auth~1me"
  /api/v1/auth/tenants:
    $ref: "./domains/auth.yaml#/paths/~1api~1v1~1auth~1tenants"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    StatusOK:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    StatusError:
      type: object
      required: [status, detail]
      properties:
        status:
          type: string
          example: error
        detail:
          type: string
          example: "database: timeout"
    APIError:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
    Tenant:
      type: object
      required:
        - id
        - slug
        - displayName
        - colorPrimary
        - colorSecondary
        - colorAccent
        - currency
        - slotIntervalMinutes
        - timezone
        - defaultLocale
        - enabled
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        displayName:
          type: string
        logoUrl:
          type: string
          nullable: true
        colorPrimary:
          type: string
          description: Hex color string.
          example: "#0f172a"
        colorSecondary:
          type: string
          description: Hex color string.
          example: "#334155"
        colorAccent:
          type: string
          description: Hex color string.
          example: "#22c55e"
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        currency:
          type: string
          example: CAD
        slotIntervalMinutes:
          type: integer
          minimum: 5
          maximum: 240
          example: 30
        timezone:
          type: string
          example: America/Toronto
        defaultLocale:
          type: string
          example: en
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SignupRequest:
      type: object
      required: [email, name, password]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string
          minLength: 8
        phone:
          type: string
          nullable: true
        locale:
          type: string
          enum: [en, pt]
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    SocialLoginRequest:
      type: object
      required: [provider]
      properties:
        provider:
          type: string
          enum: [google, facebook]
        googleIdToken:
          type: string
          description: Required when provider is google unless googleAccessToken is used.
        googleAccessToken:
          type: string
          description: Optional alternative for google provider.
        facebookAccessToken:
          type: string
          description: Required when provider is facebook.
    AuthResponse:
      type: object
      required: [token, tokenType, expiresAt, user]
      properties:
        token:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/TenantAuthUser'
        platformRole:
          type: string
          nullable: true
          example: admin
        tenantRoles:
          type: object
          additionalProperties:
            type: string
          description: Map of tenant_id -> role.
    TenantAuthUser:
      type: object
      required: [id, email, name, preferredContact, locale, emailVerified, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        phone:
          type: string
          nullable: true
        preferredContact:
          type: string
          enum: [email, phone, whatsapp]
        locale:
          type: string
          enum: [en, pt]
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AuthMeResponse:
      type: object
      required: [userId, email, name, audience, issuedAt, expiresAt]
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        audience:
          type: string
          example: booking-web
        platformRole:
          type: string
          nullable: true
        tenantRoles:
          type: object
          additionalProperties:
            type: string
        issuedAt:
          type: integer
          format: int64
        expiresAt:
          type: integer
          format: int64
    TenantAccess:
      type: object
      required: [tenantId, tenantSlug, tenantName, role]
      properties:
        tenantId:
          type: string
          format: uuid
        tenantSlug:
          type: string
        tenantName:
          type: string
        role:
          type: string
